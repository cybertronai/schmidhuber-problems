[book]
title = "Schmidhuber Problems"
description = "Implementations of synthetic learning problems from Jürgen Schmidhuber's experimental papers (1989–2025) — companion to hinton-problems"
authors = ["cybertronai"]
language = "en"
src = "src"

[output.html]
default-theme = "light"
preferred-dark-theme = "navy"
git-repository-url = "https://github.com/cybertronai/schmidhuber-problems"
edit-url-template = "https://github.com/cybertronai/schmidhuber-problems/edit/main/{path}"
site-url = "/schmidhuber-problems/"
mathjax-support = true
no-section-label = false

[output.html.fold]
enable = true
level = 1

[output.html.search]
enable = true
limit-results = 30
use-boolean-and = true
boost-title = 2
boost-hierarchy = 1
boost-paragraph = 1
expand = true
heading-split-level = 3
